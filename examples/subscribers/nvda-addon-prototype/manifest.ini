# NVDA Add-on Manifest
# See https://github.com/nvaccess/nvda/blob/master/projectDocs/dev/addons.md

name = "aaepSubscriber"
summary = "AAEP Subscriber for NVDA"
description = "Subscribes to AI agents that emit the Agent Accessibility Event Protocol (AAEP). Routes agent events to NVDA's speech engine with appropriate priority, handles user confirmation/clarification flows via keyboard gestures, and supports multilingual output including Yoruba, Hausa, and Igbo through the African Languages extension."

author = "Abdulrafiu Izuafa <Abdulrafiu@izusoft.tech>"
url = "https://aaep-protocol.org"
version = "0.1.0"

# Minimum NVDA version this add-on supports.
# 2023.1 introduced async-friendly speech APIs we rely on.
minimumNVDAVersion = "2023.1"

# Last NVDA version this add-on has been tested against.
# Update when validating against newer NVDA releases.
lastTestedNVDAVersion = "2024.4"

# NVDA add-on store categorization
addon_Type = "global"

# Manifested but not yet implemented in this prototype:
# - braille output integration
# - speech rate adjustment from pace_wpm hints
# - per-producer authentication tokens
