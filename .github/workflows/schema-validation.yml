name: Schema Validation

on:
  push:
    branches: [main]
    paths:
      - "schemas/**"
      - "conformance/aaep_conformance/fixtures/**"
      - ".github/workflows/schema-validation.yml"
  pull_request:
    branches: [main]
    paths:
      - "schemas/**"
      - "conformance/aaep_conformance/fixtures/**"
      - ".github/workflows/schema-validation.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-schemas:
    name: Validate JSON schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install validators
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema check-jsonschema

      - name: Validate each schema is well-formed
        run: |
          python <<'PY'
          from pathlib import Path
          import json
          from jsonschema import Draft202012Validator

          schemas_dir = Path("schemas")
          if not schemas_dir.is_dir():
              print("No schemas/ directory; nothing to validate")
              raise SystemExit(0)

          errors = 0
          for path in sorted(schemas_dir.rglob("*.json")):
              try:
                  schema = json.loads(path.read_text())
              except json.JSONDecodeError as e:
                  print(f"  X {path}: invalid JSON ({e})")
                  errors += 1
                  continue
              try:
                  Draft202012Validator.check_schema(schema)
              except Exception as e:
                  print(f"  X {path}: invalid schema ({e})")
                  errors += 1
                  continue
              print(f"  OK {path}")
          raise SystemExit(0 if errors == 0 else 1)
          PY

      - name: Validate all bundled fixtures parse as JSON
        run: |
          python <<'PY'
          from pathlib import Path
          import json

          fixtures_dir = Path("conformance/aaep_conformance/fixtures")
          if not fixtures_dir.is_dir():
              print("No fixtures directory; skipping")
              raise SystemExit(0)

          errors = 0
          for fixture_path in sorted(fixtures_dir.rglob("*.json")):
              try:
                  json.loads(fixture_path.read_text())
                  print(f"  OK {fixture_path}")
              except json.JSONDecodeError as e:
                  print(f"  X {fixture_path}: invalid JSON ({e})")
                  errors += 1
          raise SystemExit(0 if errors == 0 else 1)
          PY

  check-typescript-types:
    name: Verify TypeScript types parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install and type-check TypeScript producer
        working-directory: examples/producers/typescript-minimal
        run: |
          npm install
          npx tsc --noEmit
