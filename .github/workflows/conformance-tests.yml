name: Conformance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  conformance-self-test:
    name: Conformance suite self-test (Py ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install conformance suite
        working-directory: conformance
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run self-test suite
        working-directory: conformance
        run: pytest -v --tb=short

  python-producers:
    name: ${{ matrix.producer }} conformance (Py ${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: conformance-self-test
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11"]
        producer:
          - python-minimal
          - python-langchain
          - python-anthropic-sdk
          - python-microsoft-agent-framework
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install conformance suite
        run: |
          python -m pip install --upgrade pip
          pip install -e ./conformance

      - name: Install aaep-minimal-producer (local dependency)
        run: pip install -e ./examples/producers/python-minimal

      - name: Install producer ${{ matrix.producer }}
        working-directory: examples/producers/${{ matrix.producer }}
        run: pip install -e .

      - name: Start producer in background
        working-directory: examples/producers/${{ matrix.producer }}
        env:
          ANTHROPIC_API_KEY: "test-key-not-real"
          MICROSOFT_AGENT_FRAMEWORK_CLIENT_ID: "test-id"
        run: |
          case "${{ matrix.producer }}" in
            python-minimal) PORT=8080; MODULE=aaep_minimal_producer ;;
            python-langchain) PORT=8081; MODULE=aaep_langchain ;;
            python-anthropic-sdk) PORT=8082; MODULE=aaep_anthropic_sdk ;;
            python-microsoft-agent-framework) PORT=8083; MODULE=aaep_maf ;;
          esac
          echo "Starting $MODULE on port $PORT"
          python -m "${MODULE}.server" --port "$PORT" > /tmp/producer.log 2>&1 &
          echo $! > /tmp/producer.pid
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:$PORT/healthz" > /dev/null; then
              echo "Producer ready on port $PORT"
              echo "PRODUCER_PORT=$PORT" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 1
          done
          echo "Producer failed to start. Logs:"
          cat /tmp/producer.log
          exit 1

      - name: Run Level 1 conformance
        run: |
          python -m aaep_conformance.cli producer \
            --endpoint "http://localhost:${PRODUCER_PORT}" \
            --level 1 \
            --output /tmp/level1.json || echo "Level 1 reported issues; continuing"

      - name: Run Level 2 conformance
        run: |
          python -m aaep_conformance.cli producer \
            --endpoint "http://localhost:${PRODUCER_PORT}" \
            --level 2 \
            --output /tmp/level2.json || echo "Level 2 reported issues; continuing"

      - name: Upload conformance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-${{ matrix.producer }}-py${{ matrix.python }}
          path: /tmp/level*.json
          retention-days: 30

      - name: Stop producer
        if: always()
        run: |
          if [ -f /tmp/producer.pid ]; then
            kill "$(cat /tmp/producer.pid)" || true
          fi
          echo "--- producer logs ---"
          cat /tmp/producer.log || true

  typescript-producer:
    name: typescript-minimal conformance
    runs-on: ubuntu-latest
    needs: conformance-self-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: examples/producers/typescript-minimal
        run: npm install

      - name: Build
        working-directory: examples/producers/typescript-minimal
        run: npm run build

      - name: Start producer in background
        working-directory: examples/producers/typescript-minimal
        run: |
          PORT=8084 npm run server > /tmp/producer.log 2>&1 &
          echo $! > /tmp/producer.pid
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:8084/healthz" > /dev/null; then
              echo "TypeScript producer ready on port 8084"
              exit 0
            fi
            sleep 1
          done
          echo "TypeScript producer failed to start. Logs:"
          cat /tmp/producer.log
          exit 1

      - name: Set up Python for conformance suite
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install conformance suite
        run: pip install -e ./conformance

      - name: Run levels 1 and 2
        run: |
          for level in 1 2; do
            python -m aaep_conformance.cli producer \
              --endpoint "http://localhost:8084" \
              --level "$level" \
              --output "/tmp/level${level}.json" || echo "Level $level reported issues; continuing"
          done

      - name: Upload conformance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-typescript-minimal
          path: /tmp/level*.json
          retention-days: 30

      - name: Stop producer
        if: always()
        run: |
          if [ -f /tmp/producer.pid ]; then
            kill "$(cat /tmp/producer.pid)" || true
          fi
          echo "--- producer logs ---"
          cat /tmp/producer.log || true

  conformance-gate:
    name: Conformance gate
    if: always()
    needs:
      - conformance-self-test
      - python-producers
      - typescript-producer
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream results
        run: |
          if [ "${{ needs.conformance-self-test.result }}" != "success" ]; then
            echo "Conformance self-test FAILED"
            exit 1
          fi
          echo "Self-test passed. Producer matrix results:"
          echo "  python-producers: ${{ needs.python-producers.result }}"
          echo "  typescript-producer: ${{ needs.typescript-producer.result }}"
