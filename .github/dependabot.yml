# Dependabot configuration for AAEP
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Strategy: weekly updates with grouped PRs to avoid notification fatigue.
# Security updates are not throttled — they arrive immediately regardless of schedule.

version: 2

updates:

  # === GitHub Actions ===
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: scope
    labels:
      - dependencies
      - ci

  # === Python: conformance suite ===
  - package-ecosystem: pip
    directory: "/conformance/aaep_conformance"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      python-minor-and-patch:
        update-types:
          - minor
          - patch
      python-major:
        update-types:
          - major
    commit-message:
      prefix: "deps(conformance)"
    labels:
      - dependencies
      - python

  # === Python: aaep-tools ===
  - package-ecosystem: pip
    directory: "/tools/aaep-tools"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      python-minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "deps(tools)"
    labels:
      - dependencies
      - python

  # === Python: minimal producer (the reference implementation other examples build on) ===
  - package-ecosystem: pip
    directory: "/examples/producers/python-minimal"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      python-minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "deps(python-minimal)"
    labels:
      - dependencies
      - python

  # === TypeScript: minimal producer + web subscriber ===
  - package-ecosystem: npm
    directory: "/examples/producers/typescript-minimal"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "deps(typescript-minimal)"
    labels:
      - dependencies
      - typescript

  - package-ecosystem: npm
    directory: "/examples/subscribers/web-subscriber-react"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "deps(web-subscriber)"
    labels:
      - dependencies
      - typescript
