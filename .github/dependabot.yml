# Dependabot configuration for AAEP.
#
# Scheduled monthly checks with grouped PRs to keep noise low.
# Security advisories are not throttled and arrive immediately regardless
# of this schedule.

version: 2

updates:

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      all-actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - ci

  - package-ecosystem: pip
    directory: "/conformance"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      python-deps:
        patterns: ["*"]
    commit-message:
      prefix: "deps(conformance)"
    labels:
      - dependencies
      - python

  - package-ecosystem: pip
    directory: "/tools/aaep-tools"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      python-deps:
        patterns: ["*"]
    commit-message:
      prefix: "deps(tools)"
    labels:
      - dependencies
      - python

  - package-ecosystem: pip
    directory: "/examples/producers/python-minimal"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      python-deps:
        patterns: ["*"]
    commit-message:
      prefix: "deps(python-minimal)"
    labels:
      - dependencies
      - python

  - package-ecosystem: npm
    directory: "/examples/producers/typescript-minimal"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      npm-deps:
        patterns: ["*"]
    commit-message:
      prefix: "deps(typescript-minimal)"
    labels:
      - dependencies
      - typescript

  - package-ecosystem: npm
    directory: "/examples/subscribers/web-subscriber-react"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      npm-deps:
        patterns: ["*"]
    commit-message:
      prefix: "deps(web-subscriber)"
    labels:
      - dependencies
      - typescript
