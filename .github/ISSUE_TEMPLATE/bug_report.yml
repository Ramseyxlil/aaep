name: 🐛 Bug report
description: Report something that's broken or behaves unexpectedly
title: "[Bug]: "
labels:
  - bug
  - triage
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more specific
        you can be, the faster we can reproduce and fix it.

        **Before submitting:** please search [open and closed issues](https://github.com/Ramseyxlil/aaep/issues?q=is%3Aissue) to make sure this hasn't been reported.

  - type: dropdown
    id: component
    attributes:
      label: Which component is affected?
      description: Select the part of AAEP where the bug occurs.
      options:
        - Specification (spec text)
        - JSON Schemas
        - Conformance suite
        - Tooling (aaep-validate, aaep-capture, aaep-replay)
        - Python reference producer
        - TypeScript reference producer
        - LangChain integration
        - Anthropic SDK integration
        - Microsoft Agent Framework integration
        - CLI debug subscriber
        - NVDA add-on prototype
        - Web React subscriber
        - Narrator bridge prototype
        - MCP bridge
        - OpenTelemetry bridge
        - Multilingual extension
        - Medical HIPAA extension
        - Website (aaep-protocol.org)
        - Other (specify in description)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AAEP version
      description: Which version of AAEP are you using?
      placeholder: "e.g., 1.0.0"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python/Node version, browser (if applicable)
      placeholder: "e.g., Ubuntu 22.04, Python 3.11.5"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug in 2-4 sentences.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      description: Describe what you thought would happen instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: |
        Minimal steps to reproduce the bug. If possible, include code samples
        or a link to a minimal failing example.
      placeholder: |
        1. Start producer with `python -m aaep_minimal_producer.server`
        2. Send a session request: `curl -X POST http://localhost:8080/sessions ...`
        3. Observe that the resulting event is missing the `session_id` field
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: |
        Paste any relevant log output, stack traces, or error messages.
        Use code fences (triple backticks) for formatting.
      render: shell
    validations:
      required: false

  - type: textarea
    id: accessibility-impact
    attributes:
      label: Accessibility impact
      description: |
        Does this bug affect accessibility-using users? If yes, describe how.
        If not, state "no direct accessibility impact." We treat AT regressions
        as high-priority bugs.
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Terms
      options:
        - label: I have searched existing issues to confirm this hasn't been reported.
          required: true
        - label: I agree to follow the [Code of Conduct](https://github.com/Ramseyxlil/aaep/blob/main/governance/CODE_OF_CONDUCT.md).
          required: true
